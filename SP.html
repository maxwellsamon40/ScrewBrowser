<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScrewBrowser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --theme-bg: #0a0a0f;
            --accent: #8b5cf6;
            --glass: rgba(15, 15, 25, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--theme-bg);
            color: #f1f5f9;
            min-height: 100vh;
            transition: background-color 0.8s ease;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Ibis Paint Color Picker Style */
        .color-picker-container {
            width: 44px; height: 44px; border-radius: 12px;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
            position: relative; background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }
        #color-picker { position: absolute; top: -5px; left: -5px; width: 60px; height: 60px; cursor: pointer; opacity: 0; }
        .color-preview { position: absolute; inset: 4px; border-radius: 8px; background: var(--theme-bg); pointer-events: none; }

        input[type="range"] { -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; 
            background: white; border: 3px solid var(--accent); cursor: pointer; margin-top: -7px;
            box-shadow: 0 0 15px var(--accent);
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; }

        .hidden-game { display: none !important; }
        .active-track { background: rgba(139, 92, 246, 0.2) !important; border-color: var(--accent) !important; }

        body.day-mode { background-color: #f0f2f5; color: #1e293b; --glass: rgba(255, 255, 255, 0.8); --theme-bg: #f0f2f5; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="night-mode">

    <nav class="max-w-6xl mx-auto mt-6 px-4 flex justify-between items-center z-50 relative">
        <div class="flex items-center gap-4 cursor-pointer group" onclick="checkSecret()">
            <div class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <i data-lucide="zap" class="text-white fill-white"></i>
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter italic">SCREWBROWSER</h1>
                <p class="text-[8px] font-bold uppercase tracking-[0.4em] opacity-50">Instant Engine v3.0</p>
            </div>
        </div>

        <div class="flex items-center gap-3 glass-panel p-2 rounded-2xl">
            <button onclick="toggleTheme()" class="p-3 hover:bg-white/10 rounded-xl transition-all">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
            <div class="color-picker-container">
                <div id="preview-box" class="color-preview"></div>
                <input type="color" id="color-picker" value="#0a0a0f">
            </div>
            <label class="cursor-pointer bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-xl text-[10px] font-black text-white uppercase flex items-center gap-2 transition-all active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i> Importar
                <input type="file" id="audio-input" accept="audio/*" multiple class="hidden">
            </label>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
        
        <!-- Sidebar: Playlist -->
        <div class="lg:col-span-3 space-y-4" id="sidebar-playlist">
            <div class="glass-panel rounded-3xl p-6 h-[500px] flex flex-col">
                <h3 class="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4 flex items-center gap-2">
                    <i data-lucide="list-music" class="w-3 h-3"></i> Playlist
                </h3>
                <div id="playlist-items" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                    <div class="text-center py-10 opacity-20 text-[10px] font-bold">Vazio</div>
                </div>
            </div>
        </div>

        <!-- Player Central -->
        <div class="lg:col-span-9 space-y-6" id="player-column">
            <div id="welcome-ui" class="glass-panel rounded-[3rem] p-12 text-center space-y-6">
                <div class="w-20 h-20 bg-violet-600/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="music" class="w-10 h-10 text-violet-400"></i>
                </div>
                <h2 class="text-3xl font-black italic">Pronto para o Remix?</h2>
                <p class="opacity-50 text-sm max-w-sm mx-auto">Importa áudios para começar. A exportação agora é imediata e reduz 30KB do original.</p>
            </div>

            <div id="player-ui" class="hidden glass-panel rounded-[3rem] p-8 md:p-10 space-y-8 relative overflow-hidden">
                <div class="text-center relative">
                    <h2 id="track-title" class="text-2xl font-black truncate max-w-xl mx-auto italic">Sem Faixa</h2>
                    <div id="loop-status-tag" class="hidden mt-2 text-[9px] font-black text-emerald-400 uppercase tracking-widest">Loop Ativado</div>
                </div>

                <div class="space-y-4">
                    <input type="range" id="seek-bar" min="0" value="0" step="0.01" class="w-full">
                    <div class="flex justify-between text-[11px] font-bold opacity-40 font-mono">
                        <span id="time-cur">00:00</span>
                        <span id="time-total">00:00</span>
                    </div>
                </div>

                <!-- Controles -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-2">
                        <div class="flex justify-between text-[9px] font-black uppercase opacity-40"><span>Pitch</span><span id="val-pitch">1.00x</span></div>
                        <input type="range" id="slider-pitch" min="0.5" max="1.5" step="0.01" value="1.00" class="w-full">
                    </div>
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-2">
                        <div class="flex justify-between text-[9px] font-black uppercase opacity-40"><span>Speed</span><span id="val-speed">1.00x</span></div>
                        <input type="range" id="slider-speed" min="0.5" max="1.5" step="0.01" value="1.00" class="w-full">
                    </div>
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-2">
                        <div class="flex justify-between text-[9px] font-black uppercase opacity-40"><span>Bass</span><span id="val-bass">0dB</span></div>
                        <input type="range" id="slider-bass" min="0" max="40" step="1" value="0" class="w-full">
                    </div>
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-2">
                        <div class="flex justify-between text-[9px] font-black uppercase opacity-40"><span>Distort</span><span id="val-dist">OFF</span></div>
                        <input type="range" id="slider-dist" min="0" max="100" step="1" value="0" class="w-full">
                    </div>
                </div>

                <!-- Playback -->
                <div class="flex items-center justify-center gap-6">
                    <button id="btn-loop" class="w-14 h-14 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all border border-white/5">
                        <i data-lucide="repeat" class="w-5 h-5"></i>
                    </button>
                    <button id="btn-play" class="w-24 h-24 rounded-[2.2rem] bg-violet-600 flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all">
                        <i data-lucide="play" id="play-icon" class="w-10 h-10 text-white fill-white"></i>
                    </button>
                    <button id="btn-rev" class="w-14 h-14 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all border border-white/5">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Footer/Export -->
                <div class="pt-6 border-t border-white/5 flex flex-col md:flex-row items-center gap-6">
                    <div class="flex-1 w-full bg-black/20 p-4 rounded-xl flex items-center gap-4 border border-white/5">
                        <i data-lucide="volume-2" class="opacity-30 w-4 h-4"></i>
                        <input type="range" id="slider-vol" min="0" max="2" step="0.01" value="1.00" class="flex-1">
                    </div>
                    <button id="btn-export" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 px-8 py-5 rounded-xl font-black text-[10px] uppercase text-white shadow-lg transition-all flex items-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4"></i> Exportação Imediata
                    </button>
                </div>
            </div>
        </div>

        <!-- Painel Secreto (O Jogo) -->
        <div id="game-panel" class="lg:col-span-12 hidden-game space-y-4">
            <div class="glass-panel p-5 rounded-[2.5rem] h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex gap-2">
                        <button onclick="closeGame()" class="px-4 py-2 bg-rose-500/20 text-rose-400 rounded-lg text-[10px] font-black uppercase hover:bg-rose-500/30">
                            <i data-lucide="x" class="w-3 h-3 inline mr-1"></i> Fechar
                        </button>
                        <!-- BOTÃO DE RELOAD VOLTOU -->
                        <button onclick="reloadGame()" class="px-4 py-2 bg-emerald-500/20 text-emerald-400 rounded-lg text-[10px] font-black uppercase hover:bg-emerald-500/30">
                            <i data-lucide="refresh-cw" class="w-3 h-3 inline mr-1"></i> Recarregar Jogo
                        </button>
                    </div>
                    <span class="text-[10px] font-black opacity-20 italic">THE GAME BY MAXWELL</span>
                </div>
                <div class="bg-black rounded-2xl overflow-hidden shadow-2xl">
                    <iframe id="game-frame" src="https://gd.games/maxwell4635/the-game" class="w-full h-[600px] border-none"></iframe>
                </div>
            </div>
        </div>
    </main>

    <div id="loader" class="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[100] hidden flex flex-col items-center justify-center">
        <div class="w-14 h-14 border-4 border-violet-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h3 id="loader-text" class="text-xs font-black uppercase tracking-widest text-white">Codificando MP3...</h3>
    </div>

    <script>
        let audioCtx, analyzer, source, gainNode, bassNode, distNode;
        let playlist = [], currentIdx = -1;
        let originalBuffer, activeBuffer;
        let isPlaying = false, isLooping = false, isReverse = false;
        let speed = 1.0, pitch = 1.0, offset = 0, startTime = 0;
        let secretClicks = 0;

        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            bassNode = audioCtx.createBiquadFilter();
            bassNode.type = 'lowshelf';
            bassNode.frequency.value = 200;
            distNode = audioCtx.createWaveShaper();
            analyzer = audioCtx.createAnalyser();
            bassNode.connect(distNode).connect(gainNode).connect(analyzer).connect(audioCtx.destination);
        }

        const makeDistCurve = (amount) => {
            let k = amount, n = 44100, curve = new Float32Array(n), deg = Math.PI / 180;
            for (let i = 0; i < n; ++i) {
                let x = i * 2 / n - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        };

        // --- PLAYLIST ---
        document.getElementById('audio-input').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for(const file of files) {
                playlist.push({ file, name: file.name, size: file.size });
            }
            renderPlaylist();
            if(currentIdx === -1) selectTrack(0);
        };

        function renderPlaylist() {
            const container = document.getElementById('playlist-items');
            if(playlist.length === 0) return;
            container.innerHTML = playlist.map((item, i) => `
                <div onclick="selectTrack(${i})" class="p-3 rounded-xl border border-white/5 bg-white/5 cursor-pointer hover:bg-white/10 transition-all truncate text-[11px] font-bold ${i === currentIdx ? 'active-track' : ''}">
                    <div class="truncate">${item.name}</div>
                    <div class="text-[8px] opacity-40 font-mono mt-1">${(item.size/1024/1024).toFixed(2)} MB</div>
                </div>
            `).join('');
        }

        async function selectTrack(idx) {
            currentIdx = idx;
            const item = playlist[idx];
            initAudio();
            showLoader(true, "Lendo Ficheiro...");
            stop();
            offset = 0;
            
            const ab = await item.file.arrayBuffer();
            originalBuffer = await audioCtx.decodeAudioData(ab);
            activeBuffer = originalBuffer;
            isReverse = false;
            
            document.getElementById('track-title').innerText = item.name;
            document.getElementById('time-total').innerText = formatTime(activeBuffer.duration);
            document.getElementById('seek-bar').max = activeBuffer.duration;
            document.getElementById('seek-bar').value = 0;
            
            document.getElementById('welcome-ui').classList.add('hidden');
            document.getElementById('player-ui').classList.remove('hidden');
            document.getElementById('btn-rev').classList.remove('text-rose-400', 'bg-rose-500/20');
            
            renderPlaylist();
            showLoader(false);
            play(0);
        }

        // --- MOTOR DE ÁUDIO ---
        function play(from = offset) {
            if(!activeBuffer) return;
            if(source) { try { source.stop(); } catch(e) {} }
            
            source = audioCtx.createBufferSource();
            source.buffer = activeBuffer;
            source.playbackRate.value = speed;
            source.detune.value = (pitch - 1) * 1200;
            source.loop = isLooping;
            
            source.connect(bassNode);
            
            source.onended = () => {
                if (isLooping && isPlaying) {
                    offset = 0;
                    play(0);
                } else if (isPlaying && (offset + (audioCtx.currentTime - startTime) * speed) >= activeBuffer.duration) {
                    isPlaying = false;
                    offset = 0;
                    updateUI();
                }
            };

            source.start(0, from);
            startTime = audioCtx.currentTime;
            offset = from;
            isPlaying = true;
            updateUI();
            requestAnimationFrame(tick);
        }

        function stop() {
            if(source) { try { source.stop(); } catch(e) {} source = null; }
            if(isPlaying) {
                offset += (audioCtx.currentTime - startTime) * speed;
            }
            isPlaying = false;
            updateUI();
        }

        function tick() {
            if(!isPlaying) return;
            const now = offset + (audioCtx.currentTime - startTime) * speed;
            if(now > activeBuffer.duration && !isLooping) return;
            
            document.getElementById('seek-bar').value = now;
            document.getElementById('time-cur').innerText = formatTime(now);
            requestAnimationFrame(tick);
        }

        function updateUI() {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        }

        function formatTime(t) {
            const m = Math.floor(t/60), s = Math.floor(t%60);
            return `${m}:${s<10?'0'+s:s}`;
        }

        // --- EVENTOS ---
        document.getElementById('btn-play').onclick = () => isPlaying ? stop() : play();
        
        document.getElementById('btn-loop').onclick = function() {
            isLooping = !isLooping;
            this.classList.toggle('bg-emerald-600/20', isLooping);
            this.classList.toggle('text-emerald-400', isLooping);
            document.getElementById('loop-status-tag').classList.toggle('hidden', !isLooping);
            if(source) source.loop = isLooping;
        };

        document.getElementById('slider-pitch').oninput = (e) => {
            pitch = parseFloat(e.target.value);
            document.getElementById('val-pitch').innerText = pitch.toFixed(2)+'x';
            if(source) source.detune.setTargetAtTime((pitch-1)*1200, audioCtx.currentTime, 0.05);
        };

        document.getElementById('slider-speed').oninput = (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('val-speed').innerText = speed.toFixed(2)+'x';
            if(source) source.playbackRate.setTargetAtTime(speed, audioCtx.currentTime, 0.05);
        };

        document.getElementById('slider-bass').oninput = (e) => {
            bassNode.gain.value = e.target.value;
            document.getElementById('val-bass').innerText = e.target.value + 'dB';
        };

        document.getElementById('slider-dist').oninput = (e) => {
            const val = parseInt(e.target.value);
            distNode.curve = val > 0 ? makeDistCurve(val * 5) : null;
            document.getElementById('val-dist').innerText = val > 0 ? val + '%' : 'OFF';
        };

        document.getElementById('slider-vol').oninput = (e) => gainNode.gain.value = e.target.value;

        document.getElementById('seek-bar').oninput = (e) => {
            const wasPlaying = isPlaying;
            stop();
            offset = parseFloat(e.target.value);
            document.getElementById('time-cur').innerText = formatTime(offset);
            if(wasPlaying) play(offset);
        };

        document.getElementById('btn-rev').onclick = function() {
            if(!originalBuffer) return;
            const wasPlaying = isPlaying;
            stop();
            isReverse = !isReverse;
            this.classList.toggle('bg-rose-600/20', isReverse);
            this.classList.toggle('text-rose-400', isReverse);
            
            const channels = originalBuffer.numberOfChannels;
            activeBuffer = audioCtx.createBuffer(channels, originalBuffer.length, originalBuffer.sampleRate);
            for(let i=0; i<channels; i++) {
                const data = originalBuffer.getChannelData(i);
                const revData = activeBuffer.getChannelData(i);
                if(isReverse) {
                    for(let j=0; j<data.length; j++) revData[j] = data[data.length - 1 - j];
                } else {
                    revData.set(data);
                }
            }
            offset = 0;
            if(wasPlaying) play(0);
        };

        // --- EXPORTAÇÃO IMEDIATA MP3 ---
        document.getElementById('btn-export').onclick = async function() {
            if(!activeBuffer) return;
            showLoader(true, "Exportando MP3...");
            
            const duration = activeBuffer.duration / speed;
            const offline = new OfflineAudioContext(2, Math.floor(activeBuffer.sampleRate * duration), activeBuffer.sampleRate);
            const s = offline.createBufferSource();
            s.buffer = activeBuffer;
            s.playbackRate.value = speed;
            s.detune.value = (pitch - 1) * 1200;
            
            const b = offline.createBiquadFilter();
            b.type = 'lowshelf'; b.frequency.value = 200; b.gain.value = bassNode.gain.value;
            
            s.connect(b).connect(offline.destination);
            s.start(0);
            const rendered = await offline.startRendering();

            // Cálculo do Bitrate Inteligente
            const originalSize = playlist[currentIdx].size;
            const targetBytes = Math.max(1024 * 10, originalSize - (30 * 1024));
            let targetKbps = Math.floor((targetBytes * 8) / duration / 1000);
            const bitrates = [32, 48, 64, 96, 128, 160, 192, 256, 320];
            targetKbps = bitrates.reduce((p, c) => Math.abs(c - targetKbps) < Math.abs(p - targetKbps) ? c : p);

            const mp3encoder = new lamejs.Mp3Encoder(2, rendered.sampleRate, targetKbps);
            const mp3Data = [];
            const left = fTo16(rendered.getChannelData(0));
            const right = fTo16(rendered.getChannelData(1));
            const step = 1152;

            for (let i = 0; i < left.length; i += step) {
                const l = left.subarray(i, i + step);
                const r = right.subarray(i, i + step);
                const buf = mp3encoder.encodeBuffer(l, r);
                if (buf.length > 0) mp3Data.push(buf);
            }
            const flush = mp3encoder.flush();
            if (flush.length > 0) mp3Data.push(flush);

            const blob = new Blob(mp3Data, { type: 'audio/mp3' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `remix_${Date.now()}.mp3`;
            a.click();
            showLoader(false);
        };

        function fTo16(buf) {
            const res = new Int16Array(buf.length);
            for(let i=0; i<buf.length; i++) {
                let s = Math.max(-1, Math.min(1, buf[i]));
                res[i] = s < 0 ? s * 32768 : s * 32767;
            }
            return res;
        }

        // --- UTILIDADES ---
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            const isDay = document.body.classList.contains('day-mode');
            document.getElementById('theme-icon').setAttribute('data-lucide', isDay ? 'sun' : 'moon');
            lucide.createIcons();
        }

        document.getElementById('color-picker').oninput = (e) => {
            const color = e.target.value;
            document.body.style.backgroundColor = color;
            document.body.style.setProperty('--theme-bg', color);
            document.getElementById('preview-box').style.backgroundColor = color;
        };

        function checkSecret() { if(++secretClicks >= 12) { document.getElementById('game-panel').classList.remove('hidden-game'); secretClicks = 0; } }
        function closeGame() { document.getElementById('game-panel').classList.add('hidden-game'); }
        function reloadGame() { const f = document.getElementById('game-frame'); f.src = f.src; }
        function showLoader(s, t) { document.getElementById('loader').classList.toggle('hidden', !s); document.getElementById('loader-text').innerText = t; }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
